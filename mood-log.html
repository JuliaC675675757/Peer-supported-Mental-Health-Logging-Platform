<!DOCTYPE html>
<html>
<head>
    <title>Log Mood - Peer Mental Health Platform</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

<h1>Log Your Mood</h1>

<p>Select how you feel today:</p>

<form>
    <label>Mood:</label><br>
    <select class="input-field">
        <option>Happy</option>
        <option>Neutral</option>
        <option>Sad</option>
        <option>Stressed</option>
        <option>Anxious</option>
    </select>

    <br><br>

    <label>Reflection:</label><br>
    <textarea class="input-field" rows="4" placeholder="Write about how you feel today..."></textarea>

    <br><br>

    <button type="submit" class="btn">Save Mood</button>
</form>

<br>

<a href="dashboard.html">Back to Dashboard</a>

</body>
</html>
